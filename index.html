<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tic Tac Toe</title>
        <link rel="stylesheet" href="assets/css/style.css">
    </head>
    <body>
        <h1>Tic Tac Toe</h1>
        <button id="btn-2players">Human vs Human</button>
        <button id="btn-vs-computer">Human vs Computer</button>
        <p></p>
        <button id="btn-restart">Restart</button>
        <div id="board">
            <div class="cell x" id="cell-0" data-index="0">x</div>
            <div class="cell o" id="cell-1" data-index="1">o</div>
            <div class="cell x win" id="cell-2" data-index="2">x</div>
            <div class="cell o" id="cell-3" data-index="3">o</div>
            <div class="cell x win" id="cell-4" data-index="4">x</div>
            <div class="cell o" id="cell-5" data-index="5">o</div>
            <div class="cell x win" id="cell-6" data-index="6">x</div>
            <div class="cell o" id="cell-7" data-index="7">o</div>
            <div class="cell x" id="cell-8" data-index="8">x</div>            
        </div>
    </body>
    <script src="assets/javascript/script.js"></script>
</html>
